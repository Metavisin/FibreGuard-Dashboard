<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FibreGuard Trend Spotter v4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
--green:#22c55e;--green-d:rgba(34,197,94,.12);--blue:#3b82f6;--blue-d:rgba(59,130,246,.12);
--red:#ef4444;--red-d:rgba(239,68,68,.12);--yellow:#eab308;--yellow-d:rgba(234,179,8,.1);
--purple:#a855f7;--purple-d:rgba(168,85,247,.12);--orange:#f97316;--orange-d:rgba(249,115,22,.12);
--border:#27272a;--card:#18181b;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:inherit;text-decoration:none}
.sh{max-width:1280px;margin:0 auto;padding:0 24px}
header{padding:28px 0 20px;border-bottom:1px solid var(--border)}
header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
header h1 em{font-style:normal;color:var(--green)}
.meta{display:flex;gap:10px;margin-top:6px;font-size:11px;color:var(--text3);flex-wrap:wrap;align-items:center}
.meta .p{padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--text2);font-weight:500}
.meta .live{color:var(--green);display:flex;align-items:center;gap:4px}
.meta .live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;gap:2px;padding-top:20px;flex-wrap:wrap}
.tab{padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);
border-radius:8px 8px 0 0;transition:all .15s}
.tab:hover{color:var(--text2);background:var(--bg2)}
.tab.on{color:var(--text);background:var(--bg2)}
.tab .c{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--bg3);color:var(--text3);margin-left:5px}
.tab.on .c{background:var(--green-d);color:var(--green)}
.pnl{background:var(--bg2);border-radius:0 var(--r) var(--r) var(--r);padding:20px;min-height:300px}
.pnl[hidden]{display:none}
.tbl{width:100%;border-collapse:separate;border-spacing:0 4px}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600;
padding:4px 10px;text-align:left;position:sticky;top:0;background:var(--bg2);user-select:none}
.tbl th.num{text-align:right}
.tbl td{padding:10px;background:var(--bg);vertical-align:middle}
.tbl tr td:first-child{border-radius:var(--r) 0 0 var(--r)}
.tbl tr td:last-child{border-radius:0 var(--r) var(--r) 0}
.tbl tr{transition:all .1s}
.tbl tr:hover td{background:var(--bg3)}
.rank{font-size:11px;color:var(--text3);font-weight:700;width:32px;text-align:center}
.ht a{font-size:14px;font-weight:700;color:var(--green);transition:opacity .15s}
.ht a:hover{opacity:.7}
.ht .lnk{font-size:10px;color:var(--text3);margin-left:6px;opacity:0;transition:opacity .15s}
.tbl tr:hover .ht .lnk{opacity:1}
.dir{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.dir.r{background:var(--green-d);color:var(--green)}
.dir.n{background:var(--blue-d);color:var(--blue)}
.dir.d{background:var(--red-d);color:var(--red)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.vw{font-size:14px;font-weight:700}
.sc{font-size:11px;color:var(--text3)}
.sc-u{color:var(--orange)}
.sc-e{color:var(--purple)}
/* FG Picks */
.picks{padding:20px 0 0}
.picks-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.picks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pick{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,197,94,.02));border:1px solid rgba(34,197,94,.2);border-radius:var(--r);padding:16px;position:relative;transition:all .15s}
.pick:hover{border-color:rgba(34,197,94,.4);transform:translateY(-1px)}
.pick-rank{position:absolute;top:10px;right:12px;font-size:24px;font-weight:800;color:rgba(34,197,94,.15)}
.pick-name{font-size:15px;font-weight:700;margin-bottom:4px}
.pick-name a{color:var(--green)}
.pick-why{font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.4}
.pick-idea{font-size:11px;color:var(--text);background:rgba(34,197,94,.08);padding:6px 10px;border-radius:8px;margin-top:8px;line-height:1.4}
.pick-idea strong{color:var(--green)}
.pick-stats{font-size:10px;color:var(--text3);display:flex;gap:8px;margin-top:6px}
/* Cross-platform */
.xp-grid{display:grid;grid-template-columns:1fr;gap:12px}
.xp-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:all .15s;position:relative;overflow:hidden}
.xp-card:hover{border-color:var(--bg4);transform:translateY(-1px)}
.xp-rank{position:absolute;top:12px;right:16px;font-size:36px;font-weight:800;color:rgba(255,255,255,.04)}
.xp-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.xp-name{font-size:16px;font-weight:800}
.xp-plat{display:flex;gap:4px;flex-wrap:wrap}
.xp-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.xp-pill.tt{background:rgba(255,0,80,.12);color:#ff0050}
.xp-pill.ig{background:rgba(225,48,108,.12);color:#e1306c}
.xp-pill.yt{background:rgba(255,0,0,.12);color:#ff4444}
.xp-pill.x{background:rgba(255,255,255,.08);color:var(--text2)}
.xp-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.xp-idea{font-size:11px;color:var(--text);background:rgba(168,85,247,.08);padding:8px 12px;border-radius:8px;line-height:1.4;border-left:2px solid var(--purple)}
.xp-idea strong{color:var(--purple)}
.xp-meta{font-size:10px;color:var(--text3);margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
.xp-dir{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.xp-dir.hot{background:var(--orange-d);color:var(--orange)}
.xp-dir.peak{background:var(--green-d);color:var(--green)}
.xp-dir.rising{background:var(--purple-d);color:var(--purple)}
.xp-updated{font-size:11px;color:var(--text3);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fg-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:var(--green-d);color:var(--green);margin-left:6px}
@media(max-width:768px){
.sh{padding:0 10px}.picks-grid{grid-template-columns:1fr}
.tbl{font-size:12px}.hide-m{display:none}
}
</style></head>
<body>
<div class="sh">
<header>
<h1>🎯 FibreGuard <em>Trend Spotter</em> v4</h1>
<div class="meta">
<span class="live">Live TikTok API</span>
<span class="p" id="ts"></span>
<span class="p" id="total-hashes">Loading...</span>
<span class="p">US + EU5 (DE,FR,ES,IT,NL)</span>
</div>
</header>
<div id="fg-picks"></div>
<div class="tabs">
<button class="tab on" onclick="sw('us',this)">🇺🇸 US Market<span class="c" id="us-c">0</span></button>
<button class="tab" onclick="sw('eu',this)">🇪🇺 EU Region<span class="c" id="eu-c">0</span></button>
<button class="tab" onclick="sw('ol',this)">🔗 US-EU Overlap<span class="c" id="ol-c">0</span></button>
<button class="tab" onclick="sw('fg',this)">🛋️ FibreGuard Picks<span class="c" id="fg-c">0</span></button>
<button class="tab" onclick="sw('xp',this)">🔥 Cross-Platform<span class="c">6</span></button>
</div>
<div class="pnl" id="p-us" hidden></div>
<div class="pnl" id="p-eu" hidden></div>
<div class="pnl" id="p-ol" hidden></div>
<div class="pnl" id="p-fg" hidden></div>
<div class="pnl" id="p-xp" hidden></div>
</div>
<script>
const XP_TRENDS = [
  {name:"Sunshine Boy Trend",platforms:["tt","ig"],status:"hot",desc:"Using Rihanna's 'Kiss It Better' — specifically the 'been waiting on that sunshine boy' lyric. Creators share summer photos as a love letter to their summer selves.",fg_idea:"Show cozy FibreGuard sofa shot: 'Been waiting on that sunshine boy... but honestly my sofa is so comfortable I might just stay here.'",meta:"Rising fast · Seasonal window"},
  {name:"\"Just Gonna Put Something On The TV While I Clean\"",platforms:["tt","ig"],status:"hot",desc:"Relatable cleaning format: set up that you're about to clean, then freeze completely hypnotized by what's on TV.",fg_idea:"Perfect for furniture demos! Film yourself with cleaning supplies frozen, eyes locked on a FibreGuard sofa.",meta:"Format trend · Universal relatability"},
  {name:"\"Do You Actually Want To Do This Or Not\" Audio",platforms:["tt","ig"],status:"rising",desc:"Trending audio unlocking core memories of being dramatically scolded during fun activities.",fg_idea:"Stain test format: 'Do you actually want to spill that red wine on the sofa or not?' → shows stain-proof fabric.",meta:"Audio trend · Rising fast"},
  {name:"Don Toliver \"E85\" — \"Like Dumber and Dumber\"",platforms:["tt","ig"],status:"hot",desc:"Don Toliver's E85 is trending. Creators showcase their most chaotic friendship moments.",fg_idea:"Friendship content: 'My friend and I are like Dumber and Dumber when it comes to choosing movies over cleaning.'",meta:"Music trend · Friendship edits"},
  {name:"Reality TV Show Edit",platforms:["tt","ig","yt"],status:"peak",desc:"Creators editing everyday content like reality TV — dramatic zoom-ins, confessional-style cuts.",fg_idea:"Edit a sofa stain-test like a reality show. Confessional cut: 'I didn't think red wine stood a chance against this couch...'",meta:"3.5M+ TikTok posts"},
  {name:"Academy Awards Content (March 15)",platforms:["tt","ig","yt"],status:"rising",desc:"98th Academy Awards air March 15. Brands can jump on the conversation with Oscars-themed content.",fg_idea:"Oscars-themed sofa content: 'Who wore it best? This sofa or Zendaya's carpet look?'",meta:"Event-based · March 15 peak"}
];

let TIKTOK_DATA = null;

function fv(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n}

const FG_KEYWORDS = ['sofa','couch','cortisol','stress','calm','selfcare','comfort','furniture','home','interior','decor','living','bedroom','stain','fabric','clean','cozy','comfort','family','kids','pet','durability','relax','wellness','aesthetic','organize','cleantok','improve','design','makeover','renov','apartment','house','indoor','viral','trend','fyp','foryou','lifestyle','asmr','slow','aesthetic','quiet','calm','peaceful','周日','周末','diy','craft','handmade','wood'];
const FG_PREFIXES = ['cozy','home','room','furniture','decor','living','bed','clean','diy','asmr'];

function isFibreGuard(hashtag) {
  const h = hashtag.toLowerCase();
  for(const kw of FG_KEYWORDS) { if(h.includes(kw)) return true; }
  for(const p of FG_PREFIXES) { if(h.startsWith(p)) return true; }
  return false;
}

function getFGReason(hashtag) {
  const h = hashtag.toLowerCase();
  if(h.includes('sofa')||h.includes('couch')) return 'sofa';
  if(h.includes('furniture')) return 'furniture';
  if(h.includes('home')||h.includes('house')||h.includes('apartment')) return 'home';
  if(h.includes('interior')||h.includes('decor')||h.includes('design')) return 'decor';
  if(h.includes('cozy')) return 'cozy';
  if(h.includes('clean')||h.includes('stain')||h.includes('cleantok')) return 'cleaning';
  if(h.includes('room')||h.includes('bedroom')||h.includes('living')||h.includes('indoor')) return 'room';
  if(h.includes('kids')||h.includes('family')||h.includes('pet')) return 'family';
  if(h.includes('diy')||h.includes('craft')||h.includes('makeover')) return 'diy';
  if(h.includes('asmr')||h.includes('relax')||h.includes('calm')) return 'asmr';
  return 'lifestyle';
}

function sw(t,el){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
el.classList.add('on');
document.getElementById('p-us').hidden=t!=='us';
document.getElementById('p-eu').hidden=t!=='eu';
document.getElementById('p-ol').hidden=t!=='ol';
document.getElementById('p-fg').hidden=t!=='fg';
document.getElementById('p-xp').hidden=t!=='xp';
}

function directionLabel(d) { return {up:'↑ Rising',stable:'→ Stable',down:'↓ Declining'}[d] || '—'; }
function directionClass(d) { return {up:'r',stable:'n',down:'d'}[d] || 'n'; }

function renderUS(data) {
  const sorted = data.sort((a,b)=>b.us_score - a.us_score).slice(0,50);
  let h = '<h2 style="font-size:16px;font-weight:700;margin-bottom:2px">🇺🇸 US Market — Top 50 Trending</h2>';
  h += '<p style="font-size:12px;color:var(--text2);margin-bottom:16px">Sorted by US trend score (0-1). Showing top 50 hashtags from TikTok API.</p>';
  h += '<table class="tbl"><thead><tr><th>#</th><th>Hashtag</th><th>US Score</th><th>Trend</th><th>Views</th></tr></thead><tbody>';
  sorted.forEach((t,i)=>{
    h += '<tr><td class="rank">'+(i+1)+'</td>';
    h += '<td class="ht"><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" rel="noopener">#'+t.hashtag+'</a><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" class="lnk">↗</a></td>';
    h += '<td class="num"><span class="sc-u">'+t.us_score.toFixed(2)+'</span></td>';
    h += '<td><span class="dir '+directionClass(t.direction_us)+'">'+directionLabel(t.direction_us)+'</span></td>';
    h += '<td class="num"><span class="vw">'+fv(t.video_views)+'</span></td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('p-us').innerHTML = h;
  document.getElementById('us-c').textContent = sorted.length;
}

function renderEU(data) {
  const sorted = data.sort((a,b)=>b.eu5_score - a.eu5_score).slice(0,50);
  let h = '<h2 style="font-size:16px;font-weight:700;margin-bottom:2px">🇪🇺 EU Region — Top 50 Trending</h2>';
  h += '<p style="font-size:12px;color:var(--text2);margin-bottom:16px">Sorted by EU5 combined score (DE+FR+ES+IT+NL average). Showing top 50 hashtags.</p>';
  h += '<table class="tbl"><thead><tr><th>#</th><th>Hashtag</th><th>EU5 Score</th><th>Trend</th><th>Views</th></tr></thead><tbody>';
  sorted.forEach((t,i)=>{
    h += '<tr><td class="rank">'+(i+1)+'</td>';
    h += '<td class="ht"><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" rel="noopener">#'+t.hashtag+'</a><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" class="lnk">↗</a></td>';
    h += '<td class="num"><span class="sc-e">'+t.eu5_score.toFixed(2)+'</span></td>';
    h += '<td><span class="dir '+directionClass(t.direction_eu)+'">'+directionLabel(t.direction_eu)+'</span></td>';
    h += '<td class="num"><span class="vw">'+fv(t.video_views)+'</span></td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('p-eu').innerHTML = h;
  document.getElementById('eu-c').textContent = sorted.length;
}

function renderOverlap(data) {
  const overlap = data.filter(t=>t.us_score > 0 && t.eu5_score > 0);
  const sorted = overlap.sort((a,b)=>(b.us_score + b.eu5_score) - (a.us_score + a.eu5_score));
  let h = '<h2 style="font-size:16px;font-weight:700;margin-bottom:2px">🔗 US-EU Overlap — Trending in Both Markets</h2>';
  h += '<p style="font-size:12px;color:var(--text2);margin-bottom:16px">'+sorted.length+' hashtags trending in BOTH US and EU5 (scores > 0 in both). Sorted by combined score.</p>';
  h += '<table class="tbl"><thead><tr><th>#</th><th>Hashtag</th><th>US Score</th><th>EU5 Score</th><th>Combined</th></tr></thead><tbody>';
  sorted.forEach((t,i)=>{
    const combined = t.us_score + t.eu5_score;
    h += '<tr><td class="rank">'+(i+1)+'</td>';
    h += '<td class="ht"><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" rel="noopener">#'+t.hashtag+'</a><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" class="lnk">↗</a></td>';
    h += '<td class="num"><span class="sc-u">'+t.us_score.toFixed(2)+'</span></td>';
    h += '<td class="num"><span class="sc-e">'+t.eu5_score.toFixed(2)+'</span></td>';
    h += '<td class="num"><span class="vw">'+combined.toFixed(2)+'</span></td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('p-ol').innerHTML = h;
  document.getElementById('ol-c').textContent = sorted.length;
}

function renderFG(data) {
  const fg = data.filter(t=>isFibreGuard(t.hashtag));
  const scored = fg.map(t=>{
    const matchFactor = isFibreGuard(t.hashtag) ? 1.5 : 1.0;
    const combined = (t.us_score + t.eu5_score) / 2;
    return {...t, fg_score: combined * matchFactor, reason: getFGReason(t.hashtag)};
  });
  const sorted = scored.sort((a,b)=>b.fg_score - a.fg_score).slice(0,30);
  
  let h = '<h2 style="font-size:16px;font-weight:700;margin-bottom:2px">🛋️ FibreGuard Picks — Home & Furniture Trends</h2>';
  h += '<p style="font-size:12px;color:var(--text2);margin-bottom:16px">'+sorted.length+' hashtags matching home/furniture/interior/lifestyle keywords. Ranked by combined score × FG match factor.</p>';
  h += '<table class="tbl"><thead><tr><th>#</th><th>Hashtag</th><th>Match</th><th>US</th><th>EU5</th><th>FG Score</th></tr></thead><tbody>';
  sorted.forEach((t,i)=>{
    h += '<tr><td class="rank">'+(i+1)+'</td>';
    h += '<td class="ht"><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank" rel="noopener">#'+t.hashtag+'</a></td>';
    h += '<td><span class="fg-badge">'+t.reason+'</span></td>';
    h += '<td class="num"><span class="sc-u">'+t.us_score.toFixed(2)+'</span></td>';
    h += '<td class="num"><span class="sc-e">'+t.eu5_score.toFixed(2)+'</span></td>';
    h += '<td class="num"><span class="vw">'+t.fg_score.toFixed(2)+'</span></td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('p-fg').innerHTML = h;
  document.getElementById('fg-c').textContent = sorted.length;
  
  return sorted.slice(0,3);
}

function renderXP(){
  const platMap = {tt:'TikTok',ig:'Instagram',yt:'YouTube Shorts',x:'X / Twitter'};
  const platClass = {tt:'tt',ig:'ig',yt:'yt',x:'x'};
  const statusMap = {hot:'🔥 Hot Now',peak:'⚡ At Peak',rising:'📈 Rising'};
  const statusClass = {hot:'hot',peak:'peak',rising:'rising'};

  let html = '<h2 style="font-size:16px;font-weight:700;margin-bottom:4px">🔥 Cross-Platform Trends — This Week</h2>';
  html += '<div class="xp-updated">Researched & verified Mar 3, 2026</div>';
  html += '<div class="xp-grid">';

  XP_TRENDS.forEach((t,i) => {
    html += '<div class="xp-card"><div class="xp-rank">#'+(i+1)+'</div>';
    html += '<div class="xp-head"><span class="xp-name">'+t.name+'</span>';
    html += '<span class="xp-dir '+statusClass[t.status]+'">'+statusMap[t.status]+'</span>';
    html += '</div>';
    html += '<div class="xp-plat">'+t.platforms.map(p=>'<span class="xp-pill '+platClass[p]+'">'+platMap[p]+'</span>').join('')+'</div>';
    html += '<div class="xp-desc" style="margin-top:8px">'+t.desc+'</div>';
    html += '<div class="xp-idea"><strong>🎬 FibreGuard idea:</strong> '+t.fg_idea+'</div>';
    html += '<div class="xp-meta"><span>'+t.meta+'</span></div>';
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('p-xp').innerHTML = html;
}

function renderPicks(top3){
  const ideas = {
    'sofa':'Sofa styling tips. "3 ways to style your FibreGuard couch for maximum comfort."',
    'furniture':'Furniture reveal. "This sofa changed our whole living room vibe."',
    'home':'Home transformation. "Making our home feel brand new with stain-proof fabrics."',
    'decor':'Interior decor inspo. "Love how this fabric ties the room together."',
    'cozy':'Cozy setup. "Finally found the perfect spot to relax."',
    'cleaning':'Stain-proof demo. "Spilled wine? No stress with this fabric."',
    'room':'Room transformation. "Before and after with FibreGuard."',
    'lifestyle':'Showcase your FibreGuard furniture with this trending hashtag.'
  };
  
  let html = '<div class="picks"><div class="picks-title">🎯 Today\'s Top 3 FibreGuard Picks — Mar 3, 2026</div><div class="picks-grid">';
  
  top3.forEach((t,i) => {
    const idea = ideas[t.reason] || ideas['lifestyle'];
    html += '<div class="pick"><div class="pick-rank">#'+(i+1)+'</div>' +
      '<div class="pick-name"><a href="https://www.tiktok.com/tag/'+t.hashtag+'" target="_blank">#'+t.hashtag+'</a><span class="fg-badge">'+t.reason+'</span></div>' +
      '<div class="pick-stats"><span>US: '+t.us_score.toFixed(2)+'</span><span>EU5: '+t.eu5_score.toFixed(2)+'</span><span>Score: '+t.fg_score.toFixed(2)+'</span></div>' +
      '<div class="pick-idea"><strong>💡 Video idea:</strong> '+idea+'</div></div>';
  });
  
  html += '</div></div>';
  document.getElementById('fg-picks').innerHTML = html;
}

async function init(){
  document.getElementById('ts').textContent=new Date().toLocaleString('en-GB',{timeZone:'Europe/Madrid',weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+' CET';
  
  try {
    const resp = await fetch('tiktok-data.json');
    const json = await resp.json();
    TIKTOK_DATA = json.hashtags;
    document.getElementById('total-hashes').textContent = TIKTOK_DATA.length + ' hashtags';
    
    renderUS(TIKTOK_DATA);
    renderEU(TIKTOK_DATA);
    renderOverlap(TIKTOK_DATA);
    const top3 = renderFG(TIKTOK_DATA);
    renderPicks(top3);
    renderXP();
    
    // Show US tab by default
    document.getElementById('p-us').hidden = false;
  } catch(e) {
    console.error('Error loading data:', e);
    document.getElementById('p-us').innerHTML = '<p style="color:var(--red)">Error loading data. Make sure tiktok-data.json exists.</p>';
  }
}
init();
</script></body></html>
