<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FibreGuard Trend Spotter v5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
--green:#22c55e;--green-d:rgba(34,197,94,.12);--blue:#3b82f6;--blue-d:rgba(59,130,246,.12);
--red:#ef4444;--red-d:rgba(239,68,68,.12);--yellow:#eab308;--yellow-d:rgba(234,179,8,.1);
--purple:#a855f7;--purple-d:rgba(168,85,247,.12);--orange:#f97316;--orange-d:rgba(249,115,22,.12);
--cyan:#06b6d4;--cyan-d:rgba(6,182,212,.12);--pink:#ec4899;--pink-d:rgba(236,72,153,.12);
--border:#27272a;--card:#18181b;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
.sh{max-width:1400px;margin:0 auto;padding:0 24px}

/* Header */
header{padding:28px 0 20px;border-bottom:1px solid var(--border)}
header h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
header h1 em{font-style:normal;color:var(--green)}
header h1 .v{font-size:12px;font-weight:600;color:var(--text3);vertical-align:super;margin-left:4px}
.meta{display:flex;gap:10px;margin-top:6px;font-size:11px;color:var(--text3);flex-wrap:wrap;align-items:center}
.meta .p{padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--text2);font-weight:500}
.meta .live{color:var(--green);display:flex;align-items:center;gap:4px}
.meta .live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

/* FG Picks (Top Bar) */
.picks{padding:20px 0 0}
.picks-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.picks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pick{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,197,94,.02));border:1px solid rgba(34,197,94,.2);border-radius:var(--r);padding:16px;position:relative;transition:all .15s}
.pick:hover{border-color:rgba(34,197,94,.4);transform:translateY(-1px)}
.pick-rank{position:absolute;top:10px;right:12px;font-size:24px;font-weight:900;color:rgba(34,197,94,.15)}
.pick-name{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--green)}
.pick-why{font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.4}
.pick-idea{font-size:11px;color:var(--text);background:rgba(34,197,94,.08);padding:8px 10px;border-radius:8px;margin-top:8px;line-height:1.5}
.pick-idea strong{color:var(--green)}
.pick-stats{font-size:10px;color:var(--text3);display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.pick-plat{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.pick-plat.tt{background:rgba(255,0,80,.12);color:#ff0050}
.pick-plat.ig{background:rgba(225,48,108,.12);color:#e1306c}

/* Tabs */
.tabs{display:flex;gap:2px;padding-top:20px;flex-wrap:wrap}
.tab{padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);
border-radius:8px 8px 0 0;transition:all .15s}
.tab:hover{color:var(--text2);background:var(--bg2)}
.tab.on{color:var(--text);background:var(--bg2)}
.tab .c{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--bg3);color:var(--text3);margin-left:5px}
.tab.on .c{background:var(--green-d);color:var(--green)}

/* Panels */
.pnl{background:var(--bg2);border-radius:0 var(--r) var(--r) var(--r);padding:20px;min-height:300px;display:none}
.pnl.on{display:block}
.global-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(168,85,247,.12);color:var(--purple);white-space:nowrap}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.controls label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.controls select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer}
.controls select:focus{outline:none;border-color:var(--green)}

/* Sub-tabs (EU countries) */
.sub-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text3);border-radius:6px;transition:all .15s}
.sub-tab:hover{border-color:var(--bg4);color:var(--text2)}
.sub-tab.on{border-color:var(--blue);color:var(--blue);background:var(--blue-d)}

/* Table */
.tbl{width:100%;border-collapse:separate;border-spacing:0 4px}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600;
padding:4px 10px;text-align:left;position:sticky;top:0;background:var(--bg2);user-select:none;cursor:pointer;white-space:nowrap}
.tbl th:hover{color:var(--text2)}
.tbl th.num{text-align:right}
.tbl th.active{color:var(--green)}
.tbl th .arrow{font-size:8px;margin-left:2px;opacity:.5}
.tbl th.active .arrow{opacity:1}
.tbl td{padding:10px;background:var(--bg);vertical-align:middle}
.tbl tr td:first-child{border-radius:var(--r) 0 0 var(--r)}
.tbl tr td:last-child{border-radius:0 var(--r) var(--r) 0}
.tbl tr{transition:all .1s}
.tbl tr:hover td{background:var(--bg3)}
.rank{font-size:11px;color:var(--text3);font-weight:700;width:32px;text-align:center}
.ht a{font-size:14px;font-weight:700;color:var(--green);transition:opacity .15s}
.ht a:hover{opacity:.7}
.ht .lnk{font-size:10px;color:var(--text3);margin-left:6px;opacity:0;transition:opacity .15s}
.tbl tr:hover .ht .lnk{opacity:1}
.dir{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.dir.r{background:var(--green-d);color:var(--green)}
.dir.n{background:var(--blue-d);color:var(--blue)}
.dir.d{background:var(--red-d);color:var(--red)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.vw{font-size:14px;font-weight:700}
.age-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
.age-pill.young{background:var(--cyan-d);color:var(--cyan)}
.age-pill.mid{background:var(--purple-d);color:var(--purple)}
.age-pill.older{background:var(--orange-d);color:var(--orange)}
.industry-tag{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:3px;white-space:nowrap}
.mini-chart{display:inline-flex;align-items:flex-end;gap:1px;height:20px;vertical-align:middle}
.mini-chart span{width:3px;background:var(--green);border-radius:1px;min-height:2px;transition:height .2s}

/* Claw Research - Viral Trends */
.trend-cards{display:grid;grid-template-columns:1fr;gap:12px}
.trend-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:all .15s}
.trend-card:hover{border-color:var(--bg4);transform:translateY(-1px)}
.trend-rank{position:absolute;top:12px;right:16px;font-size:40px;font-weight:900;color:rgba(255,255,255,.03)}
.trend-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.trend-name{font-size:17px;font-weight:800}
.trend-plat{display:flex;gap:4px;flex-wrap:wrap}
.trend-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.trend-pill.tt{background:rgba(255,0,80,.12);color:#ff0050}
.trend-pill.ig{background:rgba(225,48,108,.12);color:#e1306c}
.trend-pill.yt{background:rgba(255,0,0,.12);color:#ff4444}
.trend-pill.x{background:rgba(255,255,255,.08);color:var(--text2)}
.trend-pill.web{background:rgba(34,197,94,.12);color:var(--green)}
.trend-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.trend-why{font-size:11px;color:var(--text);background:rgba(168,85,247,.08);padding:10px 14px;border-radius:8px;line-height:1.5;border-left:3px solid var(--purple)}
.trend-why strong{color:var(--purple)}
.trend-meta{font-size:10px;color:var(--text3);margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
.trend-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.trend-status.hot{background:var(--orange-d);color:var(--orange)}
.trend-status.peak{background:var(--green-d);color:var(--green)}
.trend-status.rising{background:var(--purple-d);color:var(--purple)}
.trend-updated{font-size:11px;color:var(--text3);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* FG Inline Column Filter Select */
.fg-col-select{background:var(--bg3);border:1px solid rgba(255,255,255,.1);color:var(--text2);
  padding:2px 5px;border-radius:4px;font-size:9px;font-family:inherit;cursor:pointer;
  margin-top:4px;display:block;width:100%;transition:border-color .15s}
.fg-col-select:focus{outline:none;border-color:var(--green)}

/* FG Score Modal */
.fg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fg-modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  max-width:480px;width:100%;max-height:80vh;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.7);display:flex;flex-direction:column;
  animation:slideUp .15s ease}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.fg-modal-header{padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fg-modal-body{padding:16px 20px;overflow-y:auto;flex:1;
  scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.fg-modal-body::-webkit-scrollbar{width:4px}
.fg-modal-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.fg-modal-close{background:none;border:none;color:var(--text3);font-size:16px;
  cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .15s,background .15s;line-height:1}
.fg-modal-close:hover{color:var(--text);background:var(--bg3)}

/* Score tooltip content (reused inside modal) */
.fg-score-wrap{display:inline-block;cursor:pointer}
.tt-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tt-score{font-weight:800;padding:2px 8px;border-radius:5px;font-size:12px}
.tt-cats{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.tt-cat{display:flex;align-items:center;gap:6px}
.tt-cat-name{font-weight:600;color:var(--text)}
.tt-cat-weight{font-size:10px;color:var(--text3)}
.tt-kw{font-size:10px;color:var(--green);font-style:italic}
.tt-none{color:var(--text3);font-style:italic;font-size:12px}
.tt-summary{font-size:12px;color:var(--text2);border-top:1px solid var(--border);padding-top:10px;margin-top:6px;line-height:1.6}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--text3)}
.loading .spin{display:inline-block;width:24px;height:24px;border:3px solid var(--bg3);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Table horizontal scroll wrapper */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
.tbl-wrap::-webkit-scrollbar{height:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* Responsive */
@media(max-width:768px){
  .sh{padding:0 10px}
  .picks-grid{grid-template-columns:1fr}
  .picks-title{font-size:12px;letter-spacing:.3px}
  .pick{padding:14px}
  .pick-name{font-size:14px}
  .pick-idea{font-size:11px;padding:8px}
  .tbl{font-size:12px}
  .hide-m{display:none}
  .controls{flex-direction:column;align-items:flex-start}
  .tab{padding:10px 14px;font-size:12px}
  .sub-tab{padding:7px 12px;font-size:11px}
  header{padding:16px 0 14px}
  header h1{font-size:20px}
  .meta{gap:6px}
  .pnl{padding:14px 12px}
  .trend-card{padding:14px}
  .fg-modal{max-height:90vh}
  .scroll-hint{display:block !important}
}
</style></head>
<body>
<div class="sh">
<header>
<h1>🎯 FibreGuard <em>Trend Spotter</em> <span class="v">v5</span></h1>
<div class="meta">
<span class="live">Live TikTok API</span>
<span class="p" id="ts"></span>
<span class="p" id="total-hashes">Loading...</span>
<span class="p">7-Day Period</span>
<span class="p">US + EU6 (FR,DE,IT,ES,NL,GB)</span>
</div>
</header>

<!-- FibreGuard Picks -->
<div id="fg-picks"></div>

<!-- Tabs -->
<div class="tabs">
<button class="tab on" onclick="switchTab('global',this)">🌍 Global<span class="c" id="global-c">0</span></button>
<button class="tab" onclick="switchTab('us',this)">🇺🇸 US Market<span class="c" id="us-c">0</span></button>
<button class="tab" onclick="switchTab('eu',this)">🇪🇺 EU Region<span class="c" id="eu-c">0</span></button>
<button class="tab" onclick="switchTab('claw',this)">🔬 Claw Research<span class="c">5</span></button>
</div>

<div class="pnl on" id="p-global">
<div class="loading"><div class="spin"></div><br>Loading global overlaps...</div>
</div>
<div class="pnl" id="p-us">
<div class="loading"><div class="spin"></div><br>Loading US hashtags...</div>
</div>
<div class="pnl" id="p-eu">
<div class="loading"><div class="spin"></div><br>Loading EU hashtags...</div>
</div>
<div class="pnl" id="p-claw"></div>
</div>

<script>
// ============================================
// DATA
// ============================================
const AGE_MAP = {1:'18-24',2:'25-34',3:'35-44',4:'45-54',5:'55+'};

// Cross-platform viral trends (from Claw Research — web + social research, week of Mar 9 2026)
const CLAW_TRENDS = [
  {
    name: "CBK Aesthetic — Quiet Luxury Minimalism",
    platforms: ["tt","ig"],
    status: "peak",
    desc: "Carolyn Bessette-Kennedy's iconic 90s minimalism is having a full revival. Creators are channelling effortless neutrals, clean aesthetics, and 'old money' energy — polished outfits, simple interiors, main character vibes. Audio: 'american wedding'. 213K+ posts and climbing. The format: outfit reveal or space reveal set to the audio, no captions needed.",
    why: "Quiet luxury + home aesthetics is a direct lane for FibreGuard. Neutral tones, clean surfaces, understated elegance — that's the CBK vibe, and it's exactly how FibreGuard fabric looks. A sofa reveal with this audio could land perfectly.",
    meta: "Trending audio 'american wedding' · 213K posts · Home/fashion crossover",
    source: "later.com, TikTok Creative Center"
  },
  {
    name: "\"Do You Actually Want To Do This?\" — Jocko Willink Audio",
    platforms: ["tt","ig"],
    status: "hot",
    desc: "A Jocko Willink motivational clip — \"Do you actually wanna do this or not?\" — paired with trivial inconveniences. Creators lip-sync the dramatic audio while adding text like \"Me when a client asks for my availability then stops replying.\" Service businesses are crushing it with this format. The funnier the contrast between the intense audio and the mundane situation, the better.",
    why: "Perfect FibreGuard angle: pair the audio with a stain moment. 'Me when someone spills red wine on the sofa' — then the reveal that it's FibreGuard and a simple wipe cleans it. Intense audio + anticlimactic clean = comedy gold.",
    meta: "Trending audio · Business-friendly · Low production barrier",
    source: "websitebuilderexpert.com, TikTok FYP"
  },
  {
    name: "Transition Dab — Instant Before/After",
    platforms: ["tt","ig"],
    status: "hot",
    desc: "Dab the camera and instantly cut to a transformed scene. The format is exploding for product demos, outfit changes, room makeovers, and glow-ups. Audio: 'original sound - dj bux'. 81K posts. The mechanic is simple: film before, dab, cut to after. The cleaner the transition, the more satisfying the content.",
    why: "Made for FibreGuard. Stained sofa → dab → spotless sofa. Or worn fabric → dab → fresh reupholstered piece. The transition IS the product demo. Effortless to produce and high-engagement format.",
    meta: "Trending audio · 81K posts · Product demo native format",
    source: "later.com, TikTok FYP"
  },
  {
    name: "\"I Fell But I Saved My...\" — Heroic Fall Format",
    platforms: ["ig"],
    status: "rising",
    desc: "Staged falls where the creator dramatically saves their prized item — matcha latte, drink, product. The format is a photo taken from above: creator on the ground surrounded by scattered belongings, holding their precious item upright. Caption: 'POV: I fell but I saved my [product].' Coffee shops and beauty brands are using it but home brands haven't cracked it yet.",
    why: "FibreGuard angle: 'POV: I fell but I saved my FibreGuard sofa from the coffee.' Show the spilled coffee on the floor next to a pristine sofa. Or: the sofa as the hero item that survives the chaos. Untapped niche in home content.",
    meta: "Instagram Reels format · Staged photo · Low effort high engagement",
    source: "websitebuilderexpert.com, Instagram FYP"
  },
  {
    name: "\"If You Like... We Belong Together\" — Brand Discovery CTA",
    platforms: ["ig","tt"],
    status: "rising",
    desc: "Using Harry Styles' 'Aperture' audio, creators compile 10 images/clips representing their brand vibe, starting with 'If you like [aesthetic/product type]' then cutting to 'We belong together.' It's a direct follow-driver — speaking straight to your ideal audience. Handmade and home brands are seeing great follow spikes from this format.",
    why: "Perfect acquisition content for FibreGuard. 'If you like beautiful sofas that actually survive real life...' — compile shots of FibreGuard fabric in clean, stylish homes. Low production, high discoverability, algorithm-friendly with trending audio.",
    meta: "Trending audio Harry Styles 'Aperture' · Discovery/follow driver · Home brands winning",
    source: "websitebuilderexpert.com, Instagram FYP"
  }
];

// ============================================
// FIBREGUARD DYNAMIC SCORING ENGINE
// Scans all US + EU hashtags, scores for brand fit,
// picks top 3, and generates creative video ideas
// ============================================
const FG_CATEGORIES = {
  // Tier 1: Direct product demos (highest weight)
  stain:        { kw: ['stain','clean','cleantok','cleaning','wipe','spill','mess','dirty','wash','sponge','satisfied','satisfying','spotless','pristine'], weight: 3.5, emoji: '🧹' },
  furniture:    { kw: ['sofa','couch','furniture','chair','settee','loveseat','sectional','recliner','ottoman','upholstery','cushion','throw','pillow','blanket','linen','textile','fabric'], weight: 3.0, emoji: '🛋️' },
  // Tier 2: Core demo audiences
  pet:          { kw: ['pet','dog','cat','puppy','kitten','pup','kitty','fur','furparent','dogmom','dogdad','catmom','catdad','petlife','puppylove','dogsoftiktok','catsoftiktok'], weight: 2.5, emoji: '🐕' },
  family:       { kw: ['family','kids','baby','toddler','child','parent','parenting','mom','dad','mommy','daddy','familyhome','nursery','playroom','momlife','dadlife','newborn'], weight: 2.5, emoji: '👨‍👩‍👧‍👦' },
  // Tier 3: Home / interior context
  home:         { kw: ['home','house','apartment','livingroom','bedroom','kitchen','dining','room','interior','decor','homedecor','design','interiordesign','roommakeover','makeover','renovation','renovate','hometour','roomtour','homeinspo','homedesign'], weight: 2.0, emoji: '🏠' },
  outdoor:      { kw: ['outdoor','patio','deck','garden','backyard','porch','balcony','terrace','pool','sunroom','poolside','outdoorliving','alfresco'], weight: 2.0, emoji: '☀️' },
  // Tier 4: Lifestyle fit
  cozy:         { kw: ['cozy','comfort','comfortable','relax','relaxing','calm','peaceful','quiet','slow','hygge','nest','snuggle','curlup','selfcare','wellness','cortisol','stressfree','chill','lounge','lounging','asmr'], weight: 1.5, emoji: '😌' },
  aesthetic:    { kw: ['aesthetic','vibe','mood','minimal','minimalist','neutral','earthy','warm','neutraltones','cottagecore','boho','scandi','modern','classic','timeless','luxury','luxe'], weight: 1.2, emoji: '🎨' },
  organization: { kw: ['organize','organization','declutter','decluttering','tidy','storage','organised','minimalism','simplify','springclean','deepclean'], weight: 1.2, emoji: '📦' },
  food_drink:   { kw: ['wine','coffee','tea','cooking','kitchen','dinner','brunch','breakfast','foodie','recipe','baking','cocktail','juice','smoothie'], weight: 1.0, emoji: '🍷' },
  diy:          { kw: ['diy','craft','handmade','upcycle','thrift','thrifted','restore','restoration','repurpose','before_after','beforeandafter','transformation'], weight: 1.0, emoji: '🔨' }
};

// Video idea templates per category match
const FG_IDEAS = {
  stain: [
    "Satisfying ASMR stain test! Pour wine, coffee, and sauce on FibreGuard fabric — then wipe clean in one swipe. The clean reveal is the hook.",
    "\"Things that stress me out vs. things that don't\" — show spills happening on regular fabric (panic) vs FibreGuard (total calm). Satisfying contrast.",
    "POV: Your toddler just attacked the sofa with spaghetti sauce. Plot twist: it's FibreGuard. *wipes clean* Crisis averted."
  ],
  furniture: [

const FG_IDEAS_GENERIC = [
  "Ride the #{hashtag} wave with a FibreGuard twist — show the product naturally in content that matches this trending topic. The key: don't force it, let the trend carry the message.",
  "Use the #{hashtag} trend format but make the punchline about FibreGuard's stain resistance. The unexpected product reveal always gets engagement.",

// Auto-generate "about" description from TikTok API data when no manual entry exists
function autoAbout(item) {
  if (!item) return '—';
  const parts = [];
  if (item.industry) parts.push(item.industry);
  const interests = (item.interests || []).filter(Boolean).slice(0, 2);
  if (interests.length) parts.push('Audience: ' + interests.join(', '));
  return parts.length ? parts.join(' · ') : '—';
}

function scoreFG(hashtag, item = null) {
  const h = (hashtag || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  let totalScore = 0;
  let matchedCats = [];
  let topCat = null;
  let topWeight = 0;

  // Helper: check a text string against all FG categories
  const checkText = (text, weightMult = 1.0) => {
    const t = (text || '').toLowerCase().replace(/[^a-z0-9 ]/g, '');
    if (!t) return;
    for (const [cat, data] of Object.entries(FG_CATEGORIES)) {
      for (const kw of data.kw) {
        if (t.includes(kw)) {
          const w = data.weight * weightMult;
          totalScore += w;
          matchedCats.push(cat);
          if (data.weight > topWeight) { topWeight = data.weight; topCat = cat; }
          break;
        }
      }
    }
  };

  // Primary: check hashtag name (full weight)
  checkText(h, 1.0);

  // Secondary: check industry and interests (reduced weight — context signals)
  if (item) {
    checkText(item.industry || '', 0.4);
    (item.interests || []).forEach(interest => checkText(interest, 0.25));
  }

  // Exact-match bonuses
  if (h === 'cleantok' || h === 'satisfyingcleaning') totalScore += 2;
  if (h.includes('sofa') || h.includes('couch')) totalScore += 1.5;
  if (h.includes('petproof') || h.includes('stainproof')) totalScore += 2;

  return { score: totalScore, cats: [...new Set(matchedCats)], topCat };
}

function getPickData(item) {
  const fg = scoreFG(item.hashtag, item);
  const cat = fg.topCat || 'home';
  const catInfo = FG_CATEGORIES[cat] || FG_CATEGORIES.home;
  const ideas = FG_IDEAS[cat] || FG_IDEAS_GENERIC;
  // Pick a random idea (seeded by hashtag name for consistency per day)
  const seed = item.hashtag.split('').reduce((s,c)=>s+c.charCodeAt(0),0);
  const idea = ideas[seed % ideas.length];
  const reasonEmoji = catInfo.emoji;
  const reasonLabel = cat.charAt(0).toUpperCase() + cat.slice(1);

  // Direction bonus label
  const dirNote = item.direction === 'rising' ? ' · 📈 Rising now' : item.direction === 'falling' ? ' · Declining' : '';
  const countryLabel = item.country === 'US' ? '🇺🇸 US' : (EU_FLAGS[item.country] || '') + ' ' + (EU_NAMES[item.country] || item.country);

  // Use Gemini JSON score as authoritative display score (fallback to computed score)
  const jsonScore = parseInt(HASHTAG_DESCS[item.hashtag]?.fg_score);
  const displayScore = !isNaN(jsonScore) ? jsonScore : Math.round(item.effectiveScore || fg.score);

  return {
    name: `#${item.hashtag}`,
    cat: `${reasonEmoji} ${reasonLabel}`,
    country: countryLabel,
    views: item.views,
    posts: item.posts,
    direction: item.direction,
    idea: idea.replace('#{hashtag}', item.hashtag),
    stats: `${fv(item.views)} views · ${fv(item.posts)} posts · ${countryLabel}${dirNote}`,
    fgScore: displayScore,
    fgCats: fg.cats
  };
}

function computeFGPicks(allData) {
  // Score every hashtag from all countries.
  // Uses the HIGHER of: (a) Gemini JSON score from hashtag-descriptions.json,
  // or (b) JavaScript keyword-computed score. Gemini is the primary authority.
  const scored = allData
    .map(item => {
      const fg = scoreFG(item.hashtag, item);
      const jsonScore = parseInt(HASHTAG_DESCS[item.hashtag]?.fg_score);
      const effectiveScore = Math.max(fg.score, isNaN(jsonScore) ? 0 : jsonScore);
      return { ...item, fg, effectiveScore };
    })
    .filter(item => item.effectiveScore >= 6) // minimum FG Fit threshold (6+)
    .sort((a, b) => {
      // FG Fit score is the PRIMARY factor (70-80% of total score).
      // Views and posts are secondary signals only.
      const scoreA = (a.effectiveScore * 10) + Math.log10(Math.max(a.views, 1)) * 0.3 + Math.log10(Math.max(a.posts, 1)) * 0.3;
      const scoreB = (b.effectiveScore * 10) + Math.log10(Math.max(b.views, 1)) * 0.3 + Math.log10(Math.max(b.posts, 1)) * 0.3;
      return scoreB - scoreA;
    });

  // Deduplicate by topCat — we want variety in the 3 picks
  const picks = [];
  const usedCats = new Set();
  for (const item of scored) {
    const cat = item.fg.topCat || 'generic';
    if (picks.length >= 3) break;
    // Allow same cat only if we've exhausted unique ones
    if (usedCats.has(cat) && picks.length < scored.filter(s => !usedCats.has(s.fg.topCat)).length) continue;
    usedCats.add(cat);
    picks.push(item);
  }

  // If we still need more, fill without cat constraint
  if (picks.length < 3) {
    for (const item of scored) {
      if (picks.length >= 3) break;
      if (!picks.find(p => p.hashtag === item.hashtag)) picks.push(item);
    }
  }

  return picks.slice(0, 3).map(getPickData);
}

// HELPERS
// ============================================
function fv(n){if(!n||n===0)return'0';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString()}
function ageClass(a){if(!a||a==='N/A')return'';if(a==='18-24'||a==='25-34')return'young';if(a==='35-44')return'mid';return'older'}
function dirLabel(d){return{rising:'↑ Rising',stable:'→ Stable',falling:'↓ Declining'}[d]||'—'}
function dirClass(d){return{rising:'r',stable:'n',falling:'d'}[d]||'n'}

function miniChart(trend){
  if(!trend||!trend.length)return'';
  const max=Math.max(...trend,0.01);
  return '<span class="mini-chart">'+trend.map(v=>'<span style="height:'+Math.max(2,Math.round(v/max*20))+'px"></span>').join('')+'</span>';
}

// FG FIT FILTER STATE
// ============================================
let fgFilter = { us: 'all', eu: 'all' };

function setFGFilter(region, value) {
  fgFilter[region] = value;
  if (region === 'us') renderUSTable();
  else renderEUTable();
}

function applyFGFilter(data, region) {
  const f = fgFilter[region];
  if (f === 'all') return data;
  return data.filter(item => {
    const desc = HASHTAG_DESCS[item.hashtag] || {};
    const s = parseInt(desc.fg_score) || 0;
    if (f === 'high') return s >= 7;
    if (f === 'medium') return s >= 4 && s <= 6;
    if (f === 'low') return s >= 1 && s <= 3;
    if (f === 'none') return s === 0;
    return true;
  });
}

// ============================================
// SCORE EXPLANATION ENGINE
// ============================================
function explainFGScore(hashtag) {
  const h = (hashtag || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  const matches = [];
  let totalScore = 0;

  for (const [cat, data] of Object.entries(FG_CATEGORIES)) {
    for (const kw of data.kw) {
      if (h.includes(kw)) {
        matches.push({ cat, keyword: kw, weight: data.weight, emoji: data.emoji });
        totalScore += data.weight;
        break;
      }
    }
  }

  // Bonuses
  const bonuses = [];
  if (h === 'cleantok' || h === 'satisfyingcleaning') { bonuses.push('Exact match bonus: cleaning keyword'); totalScore += 2; }
  if (h.includes('sofa') || h.includes('couch')) { bonuses.push('Bonus: direct furniture term'); totalScore += 1.5; }
  if (h.includes('petproof') || h.includes('stainproof')) { bonuses.push('Bonus: proof/protection term'); totalScore += 2; }

  return { matches, bonuses, algorithmScore: totalScore };
}

function scoreTooltipHTML(hashtag, fgScore) {
  const s = parseInt(fgScore) || 0;
  const explanation = explainFGScore(hashtag);
  const desc = HASHTAG_DESCS[hashtag] || {};

  let level, levelColor, levelBg;
  if (s >= 7) { level = 'High Fit'; levelColor = 'var(--green)'; levelBg = 'var(--green-d)'; }
  else if (s >= 4) { level = 'Medium Fit'; levelColor = 'var(--yellow)'; levelBg = 'var(--yellow-d)'; }
  else if (s >= 1) { level = 'Low Fit'; levelColor = 'var(--orange)'; levelBg = 'var(--orange-d)'; }
  else { level = 'No Fit'; levelColor = 'var(--text3)'; levelBg = 'var(--bg3)'; }

  let html = `<div class="tt-title">#${hashtag} <span class="tt-score" style="background:${levelBg};color:${levelColor}">${s}/10 · ${level}</span></div>`;

  if (desc.about) {
    html += `<div style="margin-bottom:8px;font-size:11px;color:var(--text2)">${desc.about}</div>`;
  }

  if (explanation.matches.length > 0) {
    html += `<div class="tt-cats">`;
    explanation.matches.forEach(m => {
      const catLabel = m.cat.charAt(0).toUpperCase() + m.cat.slice(1);
      html += `<div class="tt-cat">${m.emoji} <span class="tt-cat-name">${catLabel}</span> <span class="tt-cat-weight">(+${m.weight} weight)</span> <span class="tt-kw">matched "${m.keyword}"</span></div>`;
    });
    html += `</div>`;
    if (explanation.bonuses.length) {
      html += `<div style="font-size:10px;color:var(--cyan);margin-bottom:6px">⭐ ${explanation.bonuses.join(' · ')}</div>`;
    }
  } else {
    html += `<div class="tt-none">No direct FibreGuard category keyword matches detected.</div>`;
  }

  html += `<div class="tt-summary">`;
  if (s >= 7) html += `Strong FibreGuard relevance — directly relates to home, furniture, cleaning, or family/pet life.`;
  else if (s >= 4) html += `Moderate relevance — touches on lifestyle themes FibreGuard can connect with (home, comfort, aesthetics).`;
  else if (s >= 1) html += `Low relevance — tangential connection. Could work with creative angle but not a natural fit.`;
  else html += `No obvious FibreGuard connection detected in this hashtag.`;
  html += `</div>`;

  return html;
}

let sortState = {global:{col:'views_combined',asc:false}, us:{col:'views',asc:false}, eu:{col:'views',asc:false}};

function sortTable(region, col){
  const st = sortState[region];
  if(st.col===col) st.asc=!st.asc; else {st.col=col;st.asc=false;}
  if(region==='us') renderUSTable();
  else renderEUTable();

// ============================================
// BUILD GLOBAL OVERLAP DATA (US ∩ EU)
// ============================================
function buildGlobalOverlap() {
  const euCombined = buildEUCombined();
  const euMap = {};
  for (const item of euCombined) euMap[item.hashtag] = item;

  const result = [];
  for (const usItem of US_DATA) {
    if (euMap[usItem.hashtag]) {
      const euItem = euMap[usItem.hashtag];
      const viewsCombined = usItem.views + euItem.views;
      const postsCombined = usItem.posts + euItem.posts;
      let direction = 'stable';
      if (usItem.direction === 'rising' || euItem.direction === 'rising') direction = 'rising';
      else if (usItem.direction === 'falling' && euItem.direction === 'falling') direction = 'falling';
      result.push({
        hashtag: usItem.hashtag,
        views_us: usItem.views,
        views_eu: euItem.views,
        views_combined: viewsCombined,
        posts_us: usItem.posts,
        posts_eu: euItem.posts,
        posts_combined: postsCombined,
        industry: usItem.industry || euItem.industry,
        interests: usItem.interests || euItem.interests || [],
        direction,
        eu_countries: euItem.countries || [],
        fg_score: parseInt(HASHTAG_DESCS[usItem.hashtag]?.fg_score) || 0
      });
    }
  }
  return result.sort((a, b) => b.views_combined - a.views_combined);
}

// ============================================
// RENDER GLOBAL TAB
// ============================================
function renderGlobalTable() {
  const data = buildGlobalOverlap();
  const st = sortState.global;
  const sorted = [...data].sort((a,b)=>{
    let va=a[st.col],vb=b[st.col];
    if(typeof va==='string') return st.asc?va.localeCompare(vb):vb.localeCompare(va);
    return st.asc?(va-vb):(vb-va);
  });

  const arrow = (col)=> st.col===col ? (st.asc?'↑':'↓') : '↕';
  const cls = (col)=> st.col===col ? 'active' : '';
  const flagMap = {FR:'🇫🇷',DE:'🇩🇪',IT:'🇮🇹',ES:'🇪🇸',NL:'🇳🇱',GB:'🇬🇧'};

  let h = `<h2 style="font-size:16px;font-weight:700;margin-bottom:2px">🌍 Global — Hashtags Trending in Both US + EU</h2>`;
  h += `<p style="font-size:12px;color:var(--text2);margin-bottom:16px">${sorted.length} hashtags trending in both the US market and at least one EU country. Combined views = US + EU aggregated. These are your highest-leverage trends — they cross markets.</p>`;
  h += `<p class="scroll-hint" style="display:none;font-size:10px;color:var(--text3);margin-bottom:8px">← Swipe table to see more →</p>`;

  if(!sorted.length){
    h += `<div class="loading" style="color:var(--text3)">No overlapping hashtags found. Data may still be loading.</div>`;
  } else {
    h += `<div class="tbl-wrap"><table class="tbl"><thead><tr>`;
    h += `<th>#</th>`;
    h += `<th>Hashtag</th>`;
    h += `<th class="num ${cls('views_combined')}" onclick="sortGlobal('views_combined')" style="cursor:pointer">Combined Views <span class="arrow">${arrow('views_combined')}</span></th>`;
    h += `<th class="num hide-m ${cls('views_us')}" onclick="sortGlobal('views_us')" style="cursor:pointer">🇺🇸 US Views <span class="arrow">${arrow('views_us')}</span></th>`;
    h += `<th class="num hide-m ${cls('views_eu')}" onclick="sortGlobal('views_eu')" style="cursor:pointer">🇪🇺 EU Views <span class="arrow">${arrow('views_eu')}</span></th>`;
    h += `<th>Trend</th>`;
    h += `<th class="hide-m">EU Countries</th>`;
    h += `<th class="hide-m" style="max-width:160px">About</th>`;
    h += `<th class="num">🎯 FG Fit</th>`;
    h += `</tr></thead><tbody>`;

    sorted.forEach((t,i)=>{
      const desc = HASHTAG_DESCS[t.hashtag] || {};
      const about = desc.about || autoAbout(t);
      const fgScore = (desc.fg_score !== undefined && desc.fg_score !== null) ? desc.fg_score : null;
      const countryBadges = (t.eu_countries||[]).map(cc=>`<span style="font-size:11px">${flagMap[cc]||cc}</span>`).join('');
      h += `<tr>`;
      h += `<td class="rank">${i+1}</td>`;
      h += `<td class="ht"><a href="https://www.tiktok.com/tag/${t.hashtag}" target="_blank" rel="noopener">#${t.hashtag}</a> <span class="global-badge">🌍 Global</span></td>`;
      h += `<td class="num"><span class="vw">${fv(t.views_combined)}</span></td>`;
      h += `<td class="num hide-m">${fv(t.views_us)}</td>`;
      h += `<td class="num hide-m">${fv(t.views_eu)}</td>`;
      h += `<td><span class="dir ${dirClass(t.direction)}">${dirLabel(t.direction)}</span></td>`;
      h += `<td class="hide-m">${countryBadges}</td>`;
      h += `<td class="hide-m" style="font-size:11px;color:var(--text2);max-width:160px;line-height:1.3">${about}</td>`;
      h += `<td style="white-space:nowrap">${fgScoreBadge(fgScore, t.hashtag)}</td>`;
      h += `</tr>`;
    });
    h += `</tbody></table></div>`;
  }

  document.getElementById('p-global').innerHTML = h;
  document.getElementById('global-c').textContent = sorted.length;
}

  if(st.col===col) st.asc=!st.asc; else {st.col=col;st.asc=false;}
  renderGlobalTable();

let EU_DATA = {}; // {FR: [...], DE: [...], ...}
let activeEUCountry = 'FR';

const EU_FLAGS = {FR:'🇫🇷',DE:'🇩🇪',IT:'🇮🇹',ES:'🇪🇸',NL:'🇳🇱',GB:'🇬🇧'};
const EU_NAMES = {FR:'France',DE:'Germany',IT:'Italy',ES:'Spain',NL:'Netherlands',GB:'United Kingdom'};

function buildEUCombined() {
  const map = {};
  for (const cc of ['FR','DE','IT','ES','NL','GB']) {
    for (const item of (EU_DATA[cc] || [])) {
      if (!map[item.hashtag]) {
        map[item.hashtag] = {
          ...item,
          country: 'EU',
          countries: [cc],
          views: item.views,
          posts: item.posts
        };
      } else {
        map[item.hashtag].views += item.views;
        map[item.hashtag].posts += item.posts;
        map[item.hashtag].countries.push(cc);
        // Promote direction: rising beats stable beats falling
        if (item.direction === 'rising') map[item.hashtag].direction = 'rising';
        else if (item.direction === 'stable' && map[item.hashtag].direction === 'falling') map[item.hashtag].direction = 'stable';
      }
    }
  }
  return Object.values(map)
    .sort((a, b) => b.views - a.views)
    .slice(0, 100)
    .map(item => ({ ...item, fg_score: parseInt(HASHTAG_DESCS[item.hashtag]?.fg_score) || 0 }));
}

// ============================================
// RENDER FG PICKS (Top Bar) — Dynamic from hashtag data
// ============================================
function renderPicks(allData){
  if(!allData || !allData.length) {
    document.getElementById('fg-picks').innerHTML = '<div class="picks"><div class="picks-title">🎯 Today\'s Top 3 FibreGuard Picks — Ranked by FG Fit Score</div><div style="font-size:12px;color:var(--text3);padding:12px 0">Loading hashtag data...</div></div>';
    return;
  }

  const picks = computeFGPicks(allData);
  if(!picks.length) {
    document.getElementById('fg-picks').innerHTML = '<div class="picks"><div class="picks-title">🎯 Today\'s Top 3 FibreGuard Picks — Ranked by FG Fit Score</div><div style="font-size:12px;color:var(--text3);padding:12px 0">No trends spotted today.</div></div>';
    return;
  }

  let html = `<div class="picks"><div class="picks-title">🎯 Today's Top 3 FibreGuard Picks — Ranked by FG Fit Score</div><div class="picks-grid">`;

  picks.forEach((p,i)=>{
    const dirBadge = p.direction === 'rising' ? '<span class="dir r" style="margin-left:6px;font-size:9px">↑ Rising</span>' :
                     p.direction === 'falling' ? '<span class="dir d" style="margin-left:6px;font-size:9px">↓ Declining</span>' :
                     '<span class="dir n" style="margin-left:6px;font-size:9px">→ Stable</span>';

    // --- A) Large FG Fit score badge ---
    const s = p.fgScore || 0;
    const badgeColor = s >= 7 ? 'var(--green)' : s >= 4 ? 'var(--yellow)' : 'var(--orange)';
    const badgeBg    = s >= 7 ? 'var(--green-d)' : s >= 4 ? 'var(--yellow-d)' : 'var(--orange-d)';
    const badgeBorder= s >= 7 ? 'rgba(34,197,94,.4)' : s >= 4 ? 'rgba(234,179,8,.4)' : 'rgba(249,115,22,.4)';
    const scoreBadge = `<span style="display:inline-flex;align-items:center;justify-content:center;height:32px;padding:0 12px;border-radius:8px;background:${badgeBg};color:${badgeColor};border:1px solid ${badgeBorder};font-size:14px;font-weight:800;letter-spacing:-.3px">${s.toFixed(1)}</span>`;

    // --- B) Score breakdown summary ---
    const cats = p.fgCats || [];
    const breakdownParts = cats.map(cat => {
      const catData = FG_CATEGORIES[cat];
      if (!catData) return '';
      const label = cat.charAt(0).toUpperCase() + cat.slice(1);
      return `${catData.emoji} ${label} (+${catData.weight})`;
    }).filter(Boolean);
    const totalScore = s.toFixed(1);
    const breakdown = breakdownParts.length
      ? breakdownParts.join(' · ') + ` = ${totalScore} FG Fit`
      : `Score: ${totalScore} FG Fit`;

    // --- C) "Why this was picked" note ---
    const dirIcon = p.direction === 'rising' ? '📈 Rising' : p.direction === 'falling' ? '📉 Declining' : '📊 Stable';
    const whyNote = `Selected: highest FG Fit score from today's live data · ${dirIcon}`;

    html += `<div class="pick">`;
    // Header row: rank on left, score badge on right
    html += `<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">`;
    html += `  <div style="font-size:24px;font-weight:900;color:rgba(34,197,94,.2);line-height:1">#${i+1}</div>`;
    html += `  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">${scoreBadge}<div style="font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px">FG Fit Score</div></div>`;
    html += `</div>`;
    // --- E) Hashtag name + Score: X.X / 10 ---
    html += `<div class="pick-name"><a href="https://www.tiktok.com/tag/${p.name.replace('#','')}" target="_blank" style="color:var(--green)">${p.name}</a> <span style="font-size:11px;font-weight:600;color:var(--text3)">· Score: ${totalScore} / 10</span>${dirBadge}</div>`;
    // --- B) Category breakdown row ---
    html += `<div style="font-size:10px;color:var(--text2);margin:4px 0 5px;line-height:1.5">${breakdown}</div>`;
    // --- C) Why note ---
    html += `<div style="font-size:10px;color:var(--text3);font-style:italic;margin-bottom:9px;line-height:1.4">${whyNote}</div>`;
    // Category + country chips
    html += `<div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap"><span class="pick-plat tt" style="background:var(--green-d);color:var(--green)">${p.cat}</span><span style="font-size:10px;color:var(--text3)">${p.country}</span></div>`;
    html += `<div class="pick-idea"><strong>💡 Video idea:</strong> ${p.idea}</div>`;
    html += `<div class="pick-stats"><span>📊 ${p.stats}</span></div>`;
    html += `</div>`;
  });

  html += `</div></div>`;
  document.getElementById('fg-picks').innerHTML = html;
}

// ============================================
// ============================================
// FG SCORE BADGE HELPER
// ============================================
function fgScoreBadge(score, hashtag) {
  if (score === null || score === undefined) return '<span style="color:var(--text3);font-size:11px">—</span>';
  const s = parseInt(score);
  if (isNaN(s)) return '<span style="color:var(--text3);font-size:11px">—</span>';
  if (s === 0) return `<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:20px;border-radius:5px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);font-size:11px;font-weight:700" title="No FibreGuard relevance">0</span>`;
  let color = s >= 8 ? 'var(--green)' : s >= 6 ? 'var(--yellow)' : s >= 4 ? 'var(--orange)' : 'var(--text3)';
  let bg = s >= 8 ? 'var(--green-d)' : s >= 6 ? 'var(--yellow-d)' : s >= 4 ? 'var(--orange-d)' : 'var(--bg3)';
  let border = s >= 8 ? 'rgba(34,197,94,.35)' : s >= 6 ? 'rgba(234,179,8,.35)' : s >= 4 ? 'rgba(249,115,22,.35)' : 'var(--border)';
  const ht = (hashtag || '').replace(/'/g, "\\'");
  return `<span class="fg-score-wrap" onclick="event.stopPropagation();showFGModal('${ht}',${s})"><span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:20px;border-radius:5px;background:${bg};color:${color};border:1px solid ${border};font-size:11px;font-weight:700;cursor:pointer;transition:transform .1s" onmouseenter="this.style.transform='scale(1.15)'" onmouseleave="this.style.transform='scale(1)'">${s}</span></span>`;
}

// Global hashtag descriptions lookup
let HASHTAG_DESCS = {};

// ============================================
// INIT — Load data from JSON
// ============================================
async function init(){
  // Timestamp
  document.getElementById('ts').textContent = new Date().toLocaleString('en-GB',{
    timeZone:'Europe/Madrid',weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
  })+' CET';

  // Render static content
  renderPicks([]); // placeholder while loading
  renderClaw();

  // Load data
  try {
    // Load hashtag descriptions alongside main data
    const [resp, descResp] = await Promise.all([
      fetch('fibreguard-v5-data.json'),
      fetch('hashtag-descriptions.json').catch(()=>null)
    ]);
    const json = await resp.json();
    if (descResp && descResp.ok) {
      HASHTAG_DESCS = await descResp.json();
    }
    
    // Helper: enrich items with fg_score for inline sorting
    const enrichItems = arr => arr.map(item => ({
      ...item,
      fg_score: parseInt(HASHTAG_DESCS[item.hashtag]?.fg_score) || 0
    }));

    // US data
    US_DATA = enrichItems(json.countries?.US || []);
    renderUSTable();

    // EU data
    const euCountries = ['FR','DE','IT','ES','NL','GB'];
    euCountries.forEach(cc=>{
      if(json.countries?.[cc]?.length) EU_DATA[cc] = enrichItems(json.countries[cc]);
    });
    
    // Set first available EU country as active
    const firstEU = euCountries.find(cc=>EU_DATA[cc]?.length);
    if(firstEU) activeEUCountry = firstEU;
    renderEUTable();

    // Render global overlap tab
    renderGlobalTable();

    // Total count
    const total = Object.values(json.countries||{}).reduce((s,arr)=>s+(arr?.length||0),0);
    document.getElementById('total-hashes').textContent = total+' hashtags loaded';

    // === FG PICKS: Compute from ALL hashtag data (US + EU combined) ===
    const allHashtags = Object.values(json.countries || {}).flat();
    renderPicks(allHashtags);

  } catch(e){
    console.error('Error loading data:', e);
    document.getElementById('p-us').innerHTML = `<div class="loading" style="color:var(--red)">⚠️ Could not load fibreguard-v5-data.json<br><br>Run: <code>python3 scripts/fetch-tiktok-v5.py</code> to fetch data</div>`;
    document.getElementById('p-eu').innerHTML = document.getElementById('p-us').innerHTML;
    document.getElementById('total-hashes').textContent = 'No data';
  }
}

init();
</script>
