<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FibreGuard Trend Spotter v5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
/* === DESIGN TOKENS === */
:root {
  --bg-deep: #06060a;
  --bg-main: #0c0c12;
  --bg-card: #12121a;
  --bg-elevated: #181824;
  --bg-hover: #1e1e2a;
  --text-primary: #f0f0f4;
  --text-secondary: #9494a8;
  --text-muted: #606070;
  --text-dim: #3a3a48;
  --accent: #14b88a;
  --accent-soft: rgba(20, 184, 138, 0.12);
  --accent-glow: rgba(20, 184, 138, 0.3);
  --accent-sec: #f065c4;
  --accent-tert: #8b8cf8;
  --green: #22c55e;
  --green-d: rgba(34,197,94,0.15);
  --blue: #3b82f6;
  --blue-d: rgba(59,130,246,0.15);
  --red: #ef4444;
  --red-d: rgba(239,68,68,0.15);
  --purple: #a855f7;
  --purple-d: rgba(168,85,247,0.15);
  --orange: #f97316;
  --orange-d: rgba(249,115,22,0.15);
  --cyan: #06b6d4;
  --cyan-d: rgba(6,182,212,0.15);
  --pink: #ec4899;
  --pink-d: rgba(236,72,153,0.15);
  --border: #222230;
  --border-card: rgba(255,255,255,0.06);
  --shadow-card: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 50px rgba(20,184,138,0.12);
  --r: 14px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg-deep);color:var(--text-primary);line-height:1.55;min-height:100vh}
a{color:inherit;text-decoration:none}
.sh{max-width:1400px;margin:0 auto;padding:0 28px}
/* Header */
header{padding:36px 0 28px;border-bottom:1px solid var(--border);position:relative}
header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
header h1{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;letter-spacing:-0.6px;display:flex;align-items:center;gap:14px}
header h1 .icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent-soft),transparent);border:1px solid var(--accent-soft);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow-glow)}
header h1 em{font-style:normal;background:linear-gradient(135deg,#14b88a,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header h1 .v{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:var(--text-muted);vertical-align:super;margin-left:8px;background:var(--bg-elevated);padding:4px 10px;border-radius:5px}
.meta{display:flex;gap:10px;margin-top:16px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;align-items:center}
.meta .p{padding:5px 12px;border-radius:8px;background:var(--bg-card);color:var(--text-secondary);font-weight:500;border:1px solid var(--border-card)}
.meta .live{color:var(--accent);display:flex;align-items:center;gap:6px;font-weight:600}
.meta .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
/* Picks */
.picks{padding:32px 0}
.picks-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.picks-title::before{content:'';width:4px;height:20px;background:var(--accent);border-radius:2px}
.picks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.pick{background:var(--bg-card);border:1px solid var(--border-card);border-radius:20px;padding:26px;position:relative;overflow:hidden;transition:all 0.35s var(--ease);animation:slideUp 0.5s var(--ease) both}
.pick:nth-child(1){animation-delay:0.1s}.pick:nth-child(2){animation-delay:0.2s}.pick:nth-child(3){animation-delay:0.3s}
.pick::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02) 0%,transparent 60%);pointer-events:none}
.pick:hover{border-color:var(--accent-soft);transform:translateY(-6px);box-shadow:var(--shadow-card),var(--shadow-glow)}
.pick-rank{position:absolute;top:18px;right:22px;font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:700;color:var(--accent);opacity:0.06;line-height:1}
.pick-name{font-size:19px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pick-name a{color:var(--accent);transition:all 0.2s}
.pick-name a:hover{filter:drop-shadow(0 0 12px var(--accent-glow))}
.pick-meta{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.pick-plat{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.pick-plat.tt{background:rgba(255,0,80,0.12);color:#ff0050}
.pick-plat.ig{background:rgba(225,48,108,0.12);color:#e1306c}
.pick-cat{background:var(--accent-soft);color:var(--accent)}
.pick-idea{font-size:14px;color:var(--text-secondary);background:var(--bg-elevated);padding:16px 18px;border-radius:12px;margin-top:14px;line-height:1.65;border-left:3px solid var(--accent)}
.pick-idea strong{color:var(--accent);font-weight:600}
.pick-stats{font-size:12px;color:var(--text-muted);display:flex;gap:14px;margin-top:16px;flex-wrap:wrap}
/* Tabs */
.tabs{display:flex;gap:5px;padding-top:24px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.tab{padding:14px 24px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-radius:12px 12px 0 0;transition:all 0.2s var(--ease);position:relative;display:flex;align-items:center;gap:8px}
.tab::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transition:transform 0.3s var(--ease)}
.tab:hover{color:var(--text-secondary);background:var(--bg-card)}
.tab.on{color:var(--text-primary);background:var(--bg-card)}
.tab.on::after{transform:scaleX(1)}
.tab .c{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg-elevated);color:var(--text-dim);font-weight:700}
.tab.on .c{background:var(--accent-soft);color:var(--accent)}
/* Panels */
.pnl{background:var(--bg-card);border-radius:0 20px 20px 20px;padding:28px;min-height:420px;display:none;animation:fadeIn 0.4s var(--ease)}
.pnl.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
/* Controls */
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls label{font-size:11px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.controls select{background:var(--bg-elevated);border:1px solid var(--border-card);color:var(--text-primary);padding:8px 14px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.2s}
.controls select:hover{border-color:var(--accent-soft)}
.controls select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
/* Sub-tabs */
.sub-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sub-tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border-card);background:var(--bg-elevated);color:var(--text-muted);border-radius:8px;transition:all 0.2s var(--ease)}
.sub-tab:hover{border-color:var(--text-dim);color:var(--text-secondary)}
.sub-tab.on{border-color:var(--accent-tert);color:var(--accent-tert);background:rgba(139,140,248,0.1)}
/* Table */
.tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border)}
.tbl{width:100%;border-collapse:separate;border-spacing:0;min-width:720px}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:700;padding:16px 18px;text-align:left;background:var(--bg-elevated);position:sticky;top:0;user-select:none;cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--border);transition:color 0.2s}
.tbl th:hover{color:var(--text-secondary)}
.tbl th.num{text-align:right}
.tbl th.active{color:var(--accent)}
.tbl th .arrow{font-size:10px;margin-left:4px;opacity:0.4}
.tbl th.active .arrow{opacity:1}
.tbl td{padding:16px 18px;background:var(--bg-card);vertical-align:middle;border-bottom:1px solid var(--border);transition:background 0.15s}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg-hover)}
.rank{font-size:12px;color:var(--text-dim);font-weight:700;width:42px;text-align:center}
.ht a{font-size:15px;font-weight:700;color:var(--accent);transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.ht a:hover{filter:drop-shadow(0 0 10px var(--accent-glow))}
.ht .lnk{font-size:11px;color:var(--text-dim);opacity:0;transition:all 0.2s}
.tbl tr:hover .ht .lnk{opacity:1;transform:translate(2px,-2px)}
.dir{font-size:10px;font-weight:700;padding:5px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.dir.r{background:var(--green-d);color:#22c55e}
.dir.n{background:var(--blue-d);color:#3b82f6}
.dir.d{background:var(--red-d);color:#ef4444}
.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.vw{font-size:15px;font-weight:700}
.age-pill{font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;white-space:nowrap}
.age-pill.young{background:var(--cyan-d);color:#06b6d4}
.age-pill.mid{background:var(--purple-d);color:#a855f7}
.age-pill.older{background:var(--orange-d);color:#f97316}
.industry-tag{font-size:11px;color:var(--text-muted);background:var(--bg-elevated);padding:5px 10px;border-radius:6px;white-space:nowrap}
.mini-chart{display:inline-flex;align-items:flex-end;gap:2px;height:26px;vertical-align:middle}
.mini-chart span{width:4px;background:var(--accent);border-radius:2px;min-height:3px;transition:height 0.3s var(--ease);opacity:0.5}
.mini-chart span:last-child{opacity:1;background:linear-gradient(180deg,#14b88a,#34d399)}
/* Trend Cards */
.trend-cards{display:grid;grid-template-columns:1fr;gap:22px}
.trend-card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:20px;padding:28px;position:relative;overflow:hidden;transition:all 0.35s var(--ease);animation:slideUp 0.5s var(--ease) both}
.trend-card:nth-child(1){animation-delay:0.05s}.trend-card:nth-child(2){animation-delay:0.1s}.trend-card:nth-child(3){animation-delay:0.15s}.trend-card:nth-child(4){animation-delay:0.2s}.trend-card:nth-child(5){animation-delay:0.25s}
.trend-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--accent-sec),var(--accent-tert));opacity:0;transition:opacity 0.3s}
.trend-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-4px);box-shadow:var(--shadow-card)}
.trend-card:hover::before{opacity:1}
.trend-rank{position:absolute;top:20px;right:26px;font-family:'Space Grotesk',sans-serif;font-size:72px;font-weight:700;color:var(--text-primary);opacity:0.03;line-height:1}
.trend-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.trend-name{font-size:19px;font-weight:700;flex:1;min-width:200px}
.trend-plat{display:flex;gap:6px;flex-wrap:wrap}
.trend-pill{font-size:10px;font-weight:700;padding:5px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.trend-pill.tt{background:rgba(255,0,80,0.15);color:#ff0050}
.trend-pill.ig{background:rgba(225,48,108,0.15);color:#e1306c}
.trend-pill.yt{background:rgba(255,0,0,0.15);color:#ff4444}
.trend-pill.x{background:rgba(255,255,255,0.08);color:var(--text-secondary)}
.trend-pill.web{background:rgba(20,184,138,0.15);color:var(--accent)}
.trend-desc{font-size:14px;color:var(--text-secondary);line-height:1.75;margin-bottom:18px}
.trend-why{font-size:13px;color:var(--text-primary);background:linear-gradient(135deg,rgba(139,140,248,0.08),rgba(240,101,196,0.04));padding:18px 22px;border-radius:14px;line-height:1.65;border-left:3px solid var(--accent-tert)}
.trend-why strong{color:var(--accent-tert);font-weight:700}
.trend-meta{font-size:12px;color:var(--text-muted);margin-top:18px;display:flex;gap:16px;flex-wrap:wrap}
.trend-status{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}
.trend-status.hot{background:var(--orange-d);color:#f97316}
.trend-status.peak{background:var(--green-d);color:#22c55e}
.trend-status.rising{background:var(--purple-d);color:#a855f7}
.trend-updated{font-size:12px;color:var(--text-dim);margin-bottom:26px;padding-bottom:18px;border-bottom:1px solid var(--border)}
/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--text-muted)}
.loading .spin{display:inline-block;width:36px;height:36px;border:3px solid var(--bg-elevated);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;margin-bottom:18px}
@keyframes sp{to{transform:rotate(360deg)}}
/* Responsive */
@media(max-width:1024px){.picks-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
.sh{padding:0 16px}header h1{font-size:24px}.picks-grid{grid-template-columns:1fr}.pick{padding:22px}
.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}.tab{padding:12px 18px;font-size:13px;white-space:nowrap}
.pnl{padding:22px 18px;border-radius:16px}.hide-m{display:none!important}
.controls{flex-direction:column;align-items:flex-start}.trend-card{padding:22px}.trend-name{font-size:17px}
}
</style></head>
<body>
<div class="sh">
<header>
<div class="icon" style="width:44px;height:44px;background:linear-gradient(135deg,rgba(20,184,138,0.12),transparent);border:1px solid rgba(20,184,138,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;box-shadow:0 0 30px rgba(20,184,138,0.15)">🎯</div>
<h1>FibreGuard <em>Trend Spotter</em> <span class="v">v5</span></h1>
<div class="meta">
<span class="live">Live TikTok API</span>
<span class="p" id="ts"></span>
<span class="p" id="total-hashes">Loading...</span>
<span class="p">7-Day Period</span>
<span class="p">US + EU6 (FR,DE,IT,ES,NL,GB)</span>
</div>
</header>

<!-- FibreGuard Picks -->
<div id="fg-picks"></div>

<!-- Tabs -->
<div class="tabs">
<button class="tab on" onclick="switchTab('us',this)">🇺🇸 US Market<span class="c" id="us-c">0</span></button>
<button class="tab" onclick="switchTab('eu',this)">🇪🇺 EU Region<span class="c" id="eu-c">0</span></button>
<button class="tab" onclick="switchTab('claw',this)">🔬 Claw Research<span class="c">5</span></button>
</div>

<div class="pnl on" id="p-us">
<div class="loading"><div class="spin"></div><br>Loading US hashtags...</div>
</div>
<div class="pnl" id="p-eu">
<div class="loading"><div class="spin"></div><br>Loading EU hashtags...</div>
</div>
<div class="pnl" id="p-claw"></div>
</div>

<script>
// ============================================
// DATA
// ============================================
const AGE_MAP = {1:'18-24',2:'25-34',3:'35-44',4:'45-54',5:'55+'};

// Cross-platform viral trends (from Claw Research — web + social research, week of Mar 3 2026)
const CLAW_TRENDS = [
  {
    name: "Sunshine Boy Trend (Rihanna — Kiss It Better)",
    platforms: ["tt","ig"],
    status: "hot",
    desc: "Creators use Rihanna's 'Kiss It Better' — the lyric 'been waiting on that sunshine boy' — as a love letter to their summer selves. Sun-soaked photos, beach days, golden hour edits. Seasonal nostalgia weaponized into content. The format is a carousel: slide 1 = bundled up in winter, slide 2 = summer era in full effect. Comments are all variations of 'take me back.'",
    why: "Peaking now before spring arrives. Massive engagement from the contrast format — winter vs summer. Universal emotion everyone can relate to.",
    meta: "Trending audio · Seasonal window closing soon",
    source: "newengen.com, TikTok FYP"
  },
  {
    name: "\"Just Gonna Put Something On The TV While I Clean\"",
    platforms: ["tt","ig"],
    status: "hot",
    desc: "You say you're putting something on the TV while you clean — then show yourself completely frozen, cleaning supplies in hand, hypnotized by whatever's on screen. The clip on the TV needs to be something so captivating nobody could look away. Works because everyone has lived this exact moment.",
    why: "One of the most relatable formats this month. Brands are using it to showcase their products as 'the thing so good you can't look away.' Cleaning/home brands have a perfect in.",
    meta: "Format trend · Universal relatability · Brand-friendly",
    source: "newengen.com, TikTok Creative Center"
  },
  {
    name: "Don Toliver \"Call Back\" Dance Trend",
    platforms: ["tt","ig"],
    status: "peak",
    desc: "Don Toliver's 'Call Back' is fueling a viral dance trend with choreography by @mai_world. The routine matches the track's smooth, hypnotic energy — fluid movements that feel effortless but look clean on camera. Don Toliver dance trends have a history of blowing up (see: 'No Idea,' 'No Pole').",
    why: "Dance trends drive the highest engagement on TikTok. 'Call Back' follows the same playbook as previous Don Toliver megahits. Audio is available for business use.",
    meta: "Dance trend · Choreography by @mai_world · Audio trending",
    source: "newengen.com, TikTok FYP"
  },
  {
    name: "Met Gala 2026 — Fashion as Fine Art",
    platforms: ["tt","ig","x"],
    status: "rising",
    desc: "Met Gala 2026 sparked massive debates about fashion interpreted as fine art. The exclusivity factor drives FOMO content — creators are doing 'if I were invited' outfit reveals, AI-generated Met Gala looks, and hot takes on celebrity outfits. Nostalgia-meets-luxury aesthetics are trending hard.",
    why: "Cultural moment with built-in virality. The 'what would you wear' format lets any brand participate. Fashion + exclusivity = engagement gold.",
    meta: "Cultural event · Fashion content · High engagement window",
    source: "blog.mean.ceo, TrendHunter"
  },
  {
    name: "Pokémon 30th Anniversary Nostalgia Wave",
    platforms: ["tt","ig","yt","x"],
    status: "rising",
    desc: "Pokémon's 30th anniversary triggered a massive nostalgia wave — unique logos for 1,000+ Pokémon encouraged viral fan content. Creators are sharing childhood memories, ranking their favorites, and creating 'which Pokémon are you' content. The nostalgia hook is insanely strong across all age groups.",
    why: "Nostalgia content consistently outperforms. Cross-generational appeal (25-45 age bracket is peak Pokémon nostalgia). Any brand can ride the 'nostalgic reveal' format.",
    meta: "Nostalgia trend · Cross-platform · High shareability",
    source: "blog.mean.ceo, TrendHunter, TikTok"
  }
];

// ============================================
// FIBREGUARD DYNAMIC SCORING ENGINE
// Scans all US + EU hashtags, scores for brand fit,
// picks top 3, and generates creative video ideas
// ============================================
const FG_CATEGORIES = {
  // Tier 1: Direct product demos (highest weight)
  stain:        { kw: ['stain','clean','cleantok','cleaning','wipe','spill','mess','dirty','wash','sponge','satisfied','satisfying','spotless','pristine'], weight: 3.5, emoji: '🧹' },
  furniture:    { kw: ['sofa','couch','furniture','chair','settee','loveseat','sectional','recliner','ottoman','upholstery','cushion','throw','pillow','blanket','linen','textile','fabric'], weight: 3.0, emoji: '🛋️' },
  // Tier 2: Core demo audiences
  pet:          { kw: ['pet','dog','cat','puppy','kitten','pup','kitty','fur','furparent','dogmom','dogdad','catmom','catdad','petlife','puppylove','dogsoftiktok','catsoftiktok'], weight: 2.5, emoji: '🐕' },
  family:       { kw: ['family','kids','baby','toddler','child','parent','parenting','mom','dad','mommy','daddy','familyhome','nursery','playroom','momlife','dadlife','newborn'], weight: 2.5, emoji: '👨‍👩‍👧‍👦' },
  // Tier 3: Home / interior context
  home:         { kw: ['home','house','apartment','livingroom','bedroom','kitchen','dining','room','interior','decor','homedecor','design','interiordesign','roommakeover','makeover','renovation','renovate','hometour','roomtour','homeinspo','homedesign'], weight: 2.0, emoji: '🏠' },
  outdoor:      { kw: ['outdoor','patio','deck','garden','backyard','porch','balcony','terrace','pool','sunroom','poolside','outdoorliving','alfresco'], weight: 2.0, emoji: '☀️' },
  // Tier 4: Lifestyle fit
  cozy:         { kw: ['cozy','comfort','comfortable','relax','relaxing','calm','peaceful','quiet','slow','hygge','nest','snuggle','curlup','selfcare','wellness','cortisol','stressfree','chill','lounge','lounging','asmr'], weight: 1.5, emoji: '😌' },

function scoreFG(hashtag) {
  const h = (hashtag || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  let totalScore = 0;
  let matchedCats = [];
  let topCat = null;
  let topWeight = 0;

  for (const [cat, data] of Object.entries(FG_CATEGORIES)) {
    for (const kw of data.kw) {
      if (h.includes(kw)) {
        totalScore += data.weight;
        matchedCats.push(cat);
        if (data.weight > topWeight) { topWeight = data.weight; topCat = cat; }
        break;
      }
    }
  }

  // Bonus for exact key terms
  if (h === 'cleantok' || h === 'satisfyingcleaning') totalScore += 2;
  if (h.includes('sofa') || h.includes('couch')) totalScore += 1.5;
  if (h.includes('petproof') || h.includes('stainproof')) totalScore += 2;

  return { score: totalScore, cats: [...new Set(matchedCats)], topCat };
}

function getPickData(item) {
  const fg = scoreFG(item.hashtag);
  const cat = fg.topCat || 'home';
  const catInfo = FG_CATEGORIES[cat] || FG_CATEGORIES.home;
  const ideas = FG_IDEAS[cat] || FG_IDEAS_GENERIC;
  // Pick a random idea (seeded by hashtag name for consistency per day)
  const seed = item.hashtag.split('').reduce((s,c)=>s+c.charCodeAt(0),0);
  const idea = ideas[seed % ideas.length];
  const reasonEmoji = catInfo.emoji;
  const reasonLabel = cat.charAt(0).toUpperCase() + cat.slice(1);

  // Direction bonus label
  const dirNote = item.direction === 'rising' ? ' · 📈 Rising now' : item.direction === 'falling' ? ' · Declining' : '';
  const countryLabel = item.country === 'US' ? '🇺🇸 US' : (EU_FLAGS[item.country] || '') + ' ' + (EU_NAMES[item.country] || item.country);

  return {
    name: `#${item.hashtag}`,
    cat: `${reasonEmoji} ${reasonLabel}`,
    country: countryLabel,
    views: item.views,
    posts: item.posts,
    direction: item.direction,
    idea: idea.replace('#{hashtag}', item.hashtag),
    stats: `${fv(item.views)} views · ${fv(item.posts)} posts · ${countryLabel}${dirNote}`
  };
}

function computeFGPicks(allData) {
  // Score every hashtag from all countries
  const scored = allData
    .map(item => ({ ...item, fg: scoreFG(item.hashtag) }))
    .filter(item => item.fg.score >= 1.0) // minimum relevance threshold
    .sort((a, b) => {
      // Sort by: FG score * log(views) to balance relevance + reach
      const scoreA = a.fg.score * Math.log10(Math.max(a.views, 1));
      const scoreB = b.fg.score * Math.log10(Math.max(b.views, 1));
      return scoreB - scoreA;
    });

  // Deduplicate by topCat — we want variety in the 3 picks
  const picks = [];
  const usedCats = new Set();
  for (const item of scored) {
    const cat = item.fg.topCat || 'generic';
    if (picks.length >= 3) break;
    // Allow same cat only if we've exhausted unique ones
    if (usedCats.has(cat) && picks.length < scored.filter(s => !usedCats.has(s.fg.topCat)).length) continue;
    usedCats.add(cat);
    picks.push(item);
  }

  // If we still need more, fill without cat constraint
  if (picks.length < 3) {
    for (const item of scored) {
      if (picks.length >= 3) break;
      if (!picks.find(p => p.hashtag === item.hashtag)) picks.push(item);
    }
  }

  return picks.slice(0, 3).map(getPickData);
}

// ============================================
// HELPERS
// ============================================
function fv(n){if(!n||n===0)return'0';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString()}
function ageClass(a){if(!a||a==='N/A')return'';if(a==='18-24'||a==='25-34')return'young';if(a==='35-44')return'mid';return'older'}
function dirLabel(d){return{rising:'↑ Rising',stable:'→ Stable',falling:'↓ Declining'}[d]||'—'}
function dirClass(d){return{rising:'r',stable:'n',falling:'d'}[d]||'n'}

function miniChart(trend){
  if(!trend||!trend.length)return'';
  const max=Math.max(...trend,0.01);
  return '<span class="mini-chart">'+trend.map(v=>'<span style="height:'+Math.max(2,Math.round(v/max*20))+'px"></span>').join('')+'</span>';
}

// INIT — Load data from JSON
// ============================================
async function init(){
  // Timestamp
  document.getElementById('ts').textContent = new Date().toLocaleString('en-GB',{
    timeZone:'Europe/Madrid',weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
  })+' CET';

  // Render static content
  renderPicks([]); // placeholder while loading
  renderClaw();

  // Load data
  try {
    const resp = await fetch('fibreguard-v5-data.json');
    const json = await resp.json();
    
    // US data
    US_DATA = json.countries?.US || [];
    renderUSTable();

    // EU data
    const euCountries = ['FR','DE','IT','ES','NL','GB'];
    euCountries.forEach(cc=>{
      if(json.countries?.[cc]?.length) EU_DATA[cc] = json.countries[cc];
    });
    
    // Set first available EU country as active
    const firstEU = euCountries.find(cc=>EU_DATA[cc]?.length);
    if(firstEU) activeEUCountry = firstEU;
    renderEUTable();

    // Total count
    const total = Object.values(json.countries||{}).reduce((s,arr)=>s+(arr?.length||0),0);
    document.getElementById('total-hashes').textContent = total+' hashtags loaded';

    // === FG PICKS: Compute from ALL hashtag data (US + EU combined) ===
    const allHashtags = Object.values(json.countries || {}).flat();
    renderPicks(allHashtags);

  } catch(e){
    console.error('Error loading data:', e);
    document.getElementById('p-us').innerHTML = `<div class="loading" style="color:var(--red)">⚠️ Could not load fibreguard-v5-data.json<br><br>Run: <code>python3 scripts/fetch-tiktok-v5.py</code> to fetch data</div>`;
    document.getElementById('p-eu').innerHTML = document.getElementById('p-us').innerHTML;
    document.getElementById('total-hashes').textContent = 'No data';
  }
}
